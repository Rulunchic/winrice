<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WinRice Manager</title>
    <script>
      window.addEventListener('error', function(event) {
        if (event.target && (event.target.tagName === 'SCRIPT' || event.target.tagName === 'LINK')) {
          alert("Resource Load Failure: Failed to load " + (event.target.src || event.target.href));
        } else {
          alert("Runtime Error: " + event.message + "\nAt: " + event.filename + ":" + event.lineno + ":" + event.colno + "\nDetails: " + event.error);
        }
      }, true);
      window.addEventListener('unhandledrejection', function(event) {
        alert("Unhandled Promise Rejection: " + event.reason);
      });
    </script>
    <style>
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      #startup-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #f0edec;
        font-family: 'JetBrains Mono', 'Cascadia Code', monospace;
        z-index: 10000;
      }
      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(0, 0, 0, 0.06);
        border-top-color: #2b6f7c;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .loader-title {
        margin-top: 16px;
        font-size: 1.25rem;
        font-weight: 600;
        color: #2b6f7c;
        letter-spacing: -0.02em;
      }
      .loader-stage {
        margin-top: 8px;
        font-size: 0.85rem;
        color: #2c363c;
        opacity: 0.8;
      }
      @media (prefers-color-scheme: dark) {
        #startup-loader {
          background-color: #1c1917;
        }
        .loader-spinner {
          border-color: rgba(255, 255, 255, 0.08);
          border-top-color: #8bc34a;
        }
        .loader-title {
          color: #8bc34a;
        }
        .loader-stage {
          color: #b2a9a5;
        }
      }
    </style>
  </head>
  <body style="background-color: var(--bg-base, #f0edec); margin: 0; overflow: hidden;">
    <div id="app">
      <div id="startup-loader">
        <div class="loader-spinner"></div>
        <div class="loader-title">WinRice Manager</div>
        <div class="loader-stage">Initializing modules...</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
